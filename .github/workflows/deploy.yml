name: Deploy to GitHub Pages

on:
  # Deploy whenever main updates, and allow manual runs from the Actions tab.
  push:
    branches: [main]
  workflow_dispatch: {}

# Grant the token the permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Enables Pages (source: GitHub Actions) on the first run so no manual
      # repo-settings toggle is needed. No-op once it's already enabled.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
